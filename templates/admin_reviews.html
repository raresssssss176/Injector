<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-5 font-sans">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-2xl font-bold mb-8 text-blue-500">Moderare Recenzii</h1>

        <h2 class="text-sm font-bold uppercase text-gray-500 mb-4">În așteptare (Pending)</h2>
        {% for r in pending %}
        <div class="bg-gray-800 p-4 rounded-xl mb-4 border border-yellow-500/30">
            <p class="text-sm italic">"{{ r.text }}"</p>
            <div class="mt-2 flex justify-between items-center text-[10px]">
                <span>De la: <strong>{{ r.name }}</strong> | Stele: {{ r.stars }}</span>
                <div class="flex gap-2">
                    <a href="/admin/reviews/approve/{{ r.id }}" class="bg-green-600 px-3 py-1 rounded-lg">Aprobă</a>
                    <a href="/admin/reviews/delete/{{ r.id }}" class="bg-red-600 px-3 py-1 rounded-lg">Șterge</a>
                </div>
            </div>
        </div>
        {% else %}
        <p class="text-gray-600 text-sm mb-8">Nu sunt recenzii noi.</p>
        {% endfor %}

        <h2 class="text-sm font-bold uppercase text-gray-500 mt-10 mb-4">Aprobate Recent</h2>
        {% for r in approved %}
        <div class="bg-gray-800/50 p-4 rounded-xl mb-2 border border-gray-700 flex justify-between items-center opacity-70">
            <span class="text-xs">{{ r.text[:50] }}...</span>
            <a href="/admin/reviews/delete/{{ r.id }}" class="text-red-500 text-[10px] font-bold">ȘTERGE</a>
        </div>
        {% endfor %}
        
        <a href="/" class="block text-center mt-10 text-gray-500 text-xs">← Înapoi la Site</a>
    </div>
</body>
</html>
